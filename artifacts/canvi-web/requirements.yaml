packages:
  "framer-motion": "For high-quality page transitions and scroll-triggered animations that give the civic brand dynamic energy"
  "clsx": "Utility for conditionally joining classNames together"
  "tailwind-merge": "Utility to cleanly merge Tailwind classes without style conflicts"
  "react-hook-form": "For robust contact form state management"
  "@hookform/resolvers": "For validating contact form with Zod"

images:
